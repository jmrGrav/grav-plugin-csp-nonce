name: CSP Nonce
slug: csp-nonce
type: plugin
version: 1.0.1
description: Generates a cryptographic CSP nonce per request and injects it into inline scripts and styles for strict Content Security Policy compliance.
icon: shield
author:
  name: Jm Rohmer
  url: https://arleo.eu
homepage: https://github.com/jmrGrav/grav-plugin-csp-nonce
demo: https://arleo.eu/fr/csp-nonce
keywords: csp, content security policy, nonce, security, xss
bugs: https://github.com/jmrGrav/grav-plugin-csp-nonce/issues
docs: https://github.com/jmrGrav/grav-plugin-csp-nonce/blob/main/README.md
license: MIT

dependencies:
  - { name: grav, version: '>=1.7.0' }

form:
  validation: strict
  fields:
    enabled:
      type: toggle
      label: Plugin enabled
      highlight: 1
      default: 1
      options:
        1: PLUGIN_ADMIN.ENABLED
        0: PLUGIN_ADMIN.DISABLED
      validate:
        type: bool
